# coturn configuration for Ahey
# Dynamic values (realm, external-ip, static-auth-secret, TLS cert paths) are
# appended as CLI flags by entrypoint.sh — keep static/security options here.

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# REST / time-limited credentials verified against the shared secret.
use-auth-secret

# Relay (media) port range. Must be opened in the droplet firewall (UDP).
# Widen this range if you expect many concurrent participants.
min-port=49160
max-port=49200

# Hardening
fingerprint
no-multicast-peers
no-cli
stale-nonce=600

# Block relaying to private / link-local ranges (prevents SSRF onto internal net)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Logging to stdout so `docker compose logs coturn` works
log-file=stdout
simple-log
